AWSTemplateFormatVersion: '2010-09-09'
Description: 'EMR Serverless application for predictive maintenance ML pipeline'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  ReleaseLabel:
    Type: String
    Default: emr-7.2.0
    Description: EMR release. emr-7.2.0 ships Spark 3.5.1.
  DataBucket:
    Type: String
    Description: S3 bucket holding the JAR, raw data, and ML output

Resources:
  # Trust policy: EMR Serverless assumes this role to read your JAR + data
  EMRServerlessJobRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Environment}-emr-ml-job-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3DataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${DataBucket}
                  - !Sub arn:aws:s3:::${DataBucket}/*
        - PolicyName: GlueCatalogAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:GetTable
                  - glue:GetPartitions
                  - glue:CreateTable
                  - glue:UpdateTable
                Resource: '*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: arn:aws:logs:*:*:/aws/emr-serverless/*

  EMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: predictive-maintenance
      ReleaseLabel: !Ref ReleaseLabel
      Type: SPARK
      MaximumCapacity:
        Cpu: 20vCPU
        Memory: 80GB
        Disk: 200GB
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 15
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: PredictiveMaintenance

Outputs:
  ApplicationId:
    Value: !Ref EMRServerlessApplication
    Export:
      Name: !Sub ${Environment}-emr-ml-app-id
  JobRoleArn:
    Value: !GetAtt EMRServerlessJobRole.Arn
    Export:
      Name: !Sub ${Environment}-emr-ml-job-role-arn
